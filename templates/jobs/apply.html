{% extends "base.html" %}

{% block title %}Apply | {{ job.title }}{% endblock %}

{% block content %}

<section class="mx-auto max-w-2xl space-y-8">

<div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
Apply for {{ job.title }}
</h1>

<p class="text-sm text-slate-500 dark:text-slate-400 mt-2">
{{ job.company }} · {{ job.location }}
</p>
</div>

<form method="post" enctype="multipart/form-data" class="space-y-6">

{% csrf_token %}

<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
Resume
</label>
{{ form.resume }}
</div>

<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
Cover Letter
</label>
{{ form.cover_letter }}
</div>

<div class="flex gap-3">

<button
type="submit"
class="rounded-xl bg-orange-500 px-6 py-2.5 text-sm font-semibold text-white hover:bg-orange-600"
>
Submit Application
</button>

<a
href="{% url 'jobs:detail' job.pk %}"
class="rounded-xl border border-slate-300 px-6 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-800"
>
Cancel
</a>

</div>

</form>

</section>

{% endblock %}
