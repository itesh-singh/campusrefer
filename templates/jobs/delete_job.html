{% extends "base.html" %}

{% block title %}Delete Job | CampusRefer{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900">Delete Job Post</h1>
    <p class="mt-4 text-sm text-slate-600">
        Are you sure you want to delete <strong>{{ job.company }} — {{ job.role }}</strong>?
    </p>

    <form method="post" class="mt-8 flex gap-3">
        {% csrf_token %}
        <button type="submit" class="rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white hover:bg-red-700">
            Yes, Delete
        </button>
        <a href="{% url 'jobs:my_jobs' %}" class="rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
