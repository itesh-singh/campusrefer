{% extends "base.html" %}

{% block title %}Delete Job | CampusRefer{% endblock %}

{% block content %}
    <h1>Delete Job Post</h1>

    <p>Are you sure you want to delete <strong>{{ job.company }} — {{ job.role }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <p><a href="{% url 'jobs:my_jobs' %}">Cancel</a></p>
{% endblock %}
