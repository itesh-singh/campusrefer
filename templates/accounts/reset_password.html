{% extends "base.html" %}

{% block title %}Reset Password | CampusRefer{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Reset password</h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                Enter your new password below.
            </p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="password" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    New password
                </label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    required
                    class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                    placeholder="Enter new password"
                >
            </div>

            <div>
                <label for="confirm_password" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Confirm password
                </label>
                <input
                    type="password"
                    name="confirm_password"
                    id="confirm_password"
                    required
                    class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                    placeholder="Confirm new password"
                >
            </div>

            <button
                type="submit"
                class="w-full rounded-2xl bg-orange-500 px-4 py-3 font-semibold text-white transition hover:bg-orange-400"
            >
                Reset password
            </button>
        </form>
    </div>
</section>
{% endblock %}
