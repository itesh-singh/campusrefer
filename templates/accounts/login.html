{% extends "base.html" %}

{% block title %}Login | CampusRefer{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
    <div class="mb-6 text-center">
        <h1 class="text-3xl font-bold tracking-tight text-slate-900">Welcome back</h1>
        <p class="mt-2 text-sm text-slate-600">
            Log in to continue to CampusRefer
        </p>
    </div>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Username</label>
            {{ form.username }}
        </div>

        <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Password</label>
            {{ form.password }}
        </div>

        <button
            type="submit"
            class="w-full rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white hover:bg-slate-700"
        >
            Login
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-600">
        Don’t have an account?
        <a href="{% url 'accounts:register' %}" class="font-semibold text-orange-600 hover:text-orange-700">
            Register
        </a>
    </p>
</div>
{% endblock %}
