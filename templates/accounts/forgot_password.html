{% extends "base.html" %}

{% block title %}Forgot Password | CampusRefer{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Forgot password</h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                Enter your email and we will send you a reset link.
            </p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="email" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Email
                </label>
                <input
                    type="email"
                    name="email"
                    id="email"
                    required
                    class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                    placeholder="Enter your email"
                >
            </div>

            <button
                type="submit"
                class="w-full rounded-2xl bg-orange-500 px-4 py-3 font-semibold text-white transition hover:bg-orange-400"
            >
                Send reset link
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-600 dark:text-slate-400">
            Back to
            <a href="{% url 'accounts:login' %}" class="font-semibold text-orange-500 hover:text-orange-400">
                Login
            </a>
        </p>
    </div>
</section>
{% endblock %}
