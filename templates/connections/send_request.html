{% extends "base.html" %}

{% block title %}Send Request | CampusRefer{% endblock %}

{% block content %}
    <h1>Send Connection Request</h1>
    <p>To: <strong>{{ profile.full_name }}</strong></p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Request</button>
    </form>
{% endblock %}
